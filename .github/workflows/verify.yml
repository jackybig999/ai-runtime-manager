name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Syntax check all source files
        run: |
          find src -name '*.js' | while read f; do
            node --check "$f" || exit 1
          done
          echo "All source files pass syntax check"

  smoke:
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Verify CLI starts without crash
        run: |
          timeout 5 node src/main.js <<< "" 2>&1 || true
          echo "CLI initialized without import errors"

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SPDX headers present
        run: |
          missing=$(find src -name '*.js' -not -path '*/node_modules/*' | while read f; do
            head -1 "$f" | grep -q "SPDX-License-Identifier" || echo "MISSING: $f"
          done)
          if [ -n "$missing" ]; then
            echo "$missing"
            exit 1
          fi
          echo "All source files have SPDX license headers"
