name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            artifact: arm-win-x64.exe
          - os: macos-13
            target: bun-darwin-x64
            artifact: arm-macos-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: arm-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build ${{ matrix.artifact }}
        run: bun build --compile --target=${{ matrix.target }} ./src/main.js --outfile ./${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure
        run: ls -R ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/arm-win-x64.exe/arm-win-x64.exe
            ./artifacts/arm-macos-x64/arm-macos-x64
            ./artifacts/arm-macos-arm64/arm-macos-arm64
